name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: j178/prek-action@v2
        env:
          SKIP: go-get-update
