name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: |
          version="${GITHUB_REF_NAME}"
          ldflags="-s -w -X github.com/liminalpurple/vcfq/internal/cli.Version=${version}"

          GOOS=linux   GOARCH=amd64 go build -ldflags "${ldflags}" -o "dist/vcfq-linux-amd64" .
          GOOS=linux   GOARCH=arm64 go build -ldflags "${ldflags}" -o "dist/vcfq-linux-arm64" .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${ldflags}" -o "dist/vcfq-darwin-amd64" .
          GOOS=darwin  GOARCH=arm64 go build -ldflags "${ldflags}" -o "dist/vcfq-darwin-arm64" .
          GOOS=windows GOARCH=amd64 go build -ldflags "${ldflags}" -o "dist/vcfq-windows-amd64.exe" .
          GOOS=windows GOARCH=arm64 go build -ldflags "${ldflags}" -o "dist/vcfq-windows-arm64.exe" .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
